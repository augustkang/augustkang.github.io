baseURL: https://augustkang.com/
languageCode: en-us
title: augustkang

module:
  imports:
    - path: github.com/imfing/hextra

pagination:
  pagerSize: 12

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

services:
  googleAnalytics:
    ID: G-KQH8MPENXW

menu:
  main:
    - name: Blog
      url: /
      weight: 1
    - name: About
      pageRef: /about
      weight: 2
    - name: Search
      weight: 3
      params:
        type: search
    - name: GitHub
      url: https://github.com/augustkang
      weight: 4
      params:
        icon: github
    - name: LinkedIn
      url: https://www.linkedin.com/in/augustkang/
      weight: 5
      params:
        icon: linkedin
    - name: Stack Overflow
      url: https://stackoverflow.com/users/11584183/augustkang
      weight: 6
      params:
        icon: stackoverflow

params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: true
    displayPoweredBy: false

  search:
    type: flexsearch
    flexsearch:
      index: content
      tokenize: forward

  blog:
    list:
      displayTags: true
      sortBy: date
      sortOrder: desc
      pagerSize: 12
    article:
      displayPagination: true

  page:
    width: wide
    contextMenu:
      enable: false

  toc:
    displayTags: true

  imageZoom:
    enable: true
